# Docker Compose para OBRAS PRO
# Desenvolvimento e Produção

services:
  # Aplicação Flask
  app:
    build: .
    ports:
      - "5000:5000"
    environment:
      - FLASK_ENV=production
      - FLASK_DEBUG=false
      - SECRET_KEY=${SECRET_KEY:?SECRET_KEY is required}
      - DATABASE_URL=${DATABASE_URL:-sqlite:///instance/obras.db}
      - RATELIMIT_STORAGE_URL=${RATELIMIT_STORAGE_URL:-memory://}
      - CACHE_TYPE=redis
      - CACHE_REDIS_URL=${CACHE_REDIS_URL:-redis://redis:6379/0}
    volumes:
      - ./instance:/app/instance
      - ./logs:/app/logs
    depends_on:
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/monitor/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Redis para cache e rate limiting
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Nginx como reverse proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - app
    restart: unless-stopped

  # Agendador de tarefas (APScheduler)
  scheduler:
    build: .
    command: python run.py --scheduler
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      - app
    restart: unless-stopped

volumes:
  redis_data:

networks:
  default:
    name: obras_pro_network