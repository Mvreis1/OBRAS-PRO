services:
  - type: web
    name: obras-financeiro
    runtime: python
    plan: free
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: obras-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URL
        value: memory://
      - key: CACHE_TYPE
        value: simple
      - key: PYTHONUNBUFFERED
        value: "1"
      # AWS S3 / Cloud Storage (OPCIONAL mas RECOMENDADO)
      # Configure para uploads persistentes entre deploys
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_S3_REGION
        value: us-east-1
      - key: AWS_S3_ENDPOINT_URL
        sync: false
      - key: AWS_S3_URL
        sync: false
    healthCheckPath: /healthz
    autoDeploy: true
    numInstances: 1

databases:
  - name: obras-db
    databaseName: obras_financeiro
    user: obras_user
    plan: free
