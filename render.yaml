services:
  - type: web
    name: obras-financeiro
    runtime: python
    plan: standard
    buildCommand: ./build.sh
    startCommand: ./start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: obras-db
          property: connectionString
      - key: RATELIMIT_STORAGE_URL
        value: memory://
      - key: CACHE_TYPE
        value: simple
      - key: PYTHONUNBUFFERED
        value: "1"
    healthCheckPath: /healthz
    autoDeploy: true
    numInstances: 1

databases:
  - name: obras-db
    databaseName: obras_financeiro
    user: obras_user
    plan: free
