{% extends "base.html" %}

{% block title %}Criar Empresa{% endblock %}

{% block extra_css %}
<style>
    .auth-container {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-primary);
        padding: 20px;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-subtle);
        border-radius: 16px;
        padding: 32px;
    }
    .auth-logo {
        width: 56px;
        height: 56px;
        background: var(--gradient-primary);
        border-radius: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        margin: 0 auto 24px;
    }
    .auth-title {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        margin-bottom: 8px;
    }
    .auth-subtitle {
        text-align: center;
        color: var(--text-muted);
        font-size: 13px;
        margin-bottom: 28px;
    }
    .form-group {
        margin-bottom: 16px;
    }
    .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: var(--text-secondary);
        margin-bottom: 6px;
    }
    .form-group input {
        width: 100%;
    }
    .btn-block {
        width: 100%;
        justify-content: center;
        padding: 12px;
        font-size: 14px;
    }
    .auth-footer {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: var(--text-muted);
    }
    .auth-footer a {
        color: var(--accent-primary);
        text-decoration: none;
    }
    .help-text {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 4px;
    }
    /* Corrigir contraste dos inputs */
    .auth-card .form-control {
        background: #1a1a2e !important;
        border-color: #3f3f46 !important;
        color: #ffffff !important;
    }
    .auth-card .form-control:focus {
        background: #16162a !important;
        color: #ffffff !important;
    }
    .auth-card .form-control::placeholder {
        color: #6b7280 !important;
    }
</style>
{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <div class="auth-logo">
            <i class="bi bi-hammer" style="color: white;"></i>
        </div>
        <h1 class="auth-title">Criar minha empresa</h1>
        <p class="auth-subtitle">Comece a gerenciar suas obras agora</p>
        
        <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
            <div class="form-group">
                <label>Nome da Empresa</label>
                <input type="text" name="nome" class="form-control" placeholder="Minha Construções Ltda" required>
            </div>
            
            <div class="form-group">
                <label>URL da Empresa</label>
                <input type="text" name="slug" class="form-control" placeholder="minha-empresa" required>
                <p class="help-text">Ex: obras.app/sua-empresa</p>
            </div>
            
            <div class="form-group">
                <label>CNPJ (opcional)</label>
                <input type="text" name="cnpj" class="form-control" placeholder="00.000.000/0001-00">
            </div>
            
            <div class="form-group">
                <label>Telefone</label>
                <input type="text" name="telefone" class="form-control" placeholder="(11) 99999-9999">
            </div>
            
            <div class="form-group">
                <label>Seu Email</label>
                <input type="email" name="email" class="form-control" placeholder="seu@email.com" required>
            </div>
            
            <div class="form-group">
                <label>Sua Senha</label>
                <input type="password" name="senha" class="form-control" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block">
                <i class="bi bi-check-lg"></i> Criar Conta Grátis
            </button>
        </form>
        
        <div class="auth-footer">
            Já tem conta? <a href="{{ url_for('auth.login') }}">Entrar</a>
        </div>
    </div>
</div>
{% endblock %}
