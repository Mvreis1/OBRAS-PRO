{% extends "base.html" %}

{% block title %}Verificação 2FA - {{ nome_sistema }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 400px; margin-top: 100px;">
    <div class="card">
        <div class="card-body">
            <div class="text-center mb-4">
                <i class="bi bi-shield-lock" style="font-size: 48px; color: var(--accent-primary);"></i>
                <h3 class="mt-3">Verificação em Duas Etapas</h3>
                <p class="text-muted">Insira o código de 6 dígitos do seu aplicativo autenticador</p>
            </div>

            <form method="POST">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                
                <div class="mb-4">
                    <label for="token" class="form-label">Código de Verificação</label>
                    <input type="text" 
                           id="token" 
                           name="token" 
                           class="form-control form-control-lg text-center" 
                           maxlength="6" 
                           pattern="[0-9]{6}"
                           placeholder="000000" 
                           autofocus 
                           required
                           style="font-size: 24px; letter-spacing: 8px;">
                    <small class="text-muted d-block mt-2">
                        <i class="bi bi-info-circle"></i> Ou use um dos seus códigos de backup
                    </small>
                </div>

                <button type="submit" class="btn btn-primary w-100 btn-lg">
                    <i class="bi bi-check-circle me-2"></i>Verificar
                </button>
            </form>

            <div class="text-center mt-4">
                <a href="{{ url_for('auth.login') }}" class="text-muted">
                    <i class="bi bi-arrow-left me-1"></i>Voltar ao login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
