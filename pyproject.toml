[tool.ruff]
# Exclude a variety of commonly ignored directories.
exclude = [
    "app/naming_guide.py",  # Documentation file with Python examples (not executable code)
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "instance",
    "migrations",
]

# Same as Black.
line-length = 100
indent-width = 4

# Assume Python 3.12
target-version = "py312"

[tool.ruff.lint]
# Enable Pyflakes (`F`) and a subset of the pycodestyle (`E`)  codes by default.
# Unlike Flake8, Ruff doesn't enable pycodestyle warnings (`W`) or
# McCabe complexity (`C901`) by default.
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "RUF",    # ruff-specific rules
    "PL",     # pylint
    "PERF",   # perflint
]
ignore = [
    "E501",     # Line too long (handled by formatter)
    "PLR0913",  # Too many arguments to function call
    "PLR2004",  # Magic value used in comparison
    "SIM105",   # Use contextlib.suppress
    "SIM108",   # Use ternary operator
    "PERF203",  # try-except within a loop
    "N806",     # Variable in function should be lowercase
    "PLC0415",  # Import should be at top-level (we use lazy imports in Flask)
    "PLR0912",  # Too many branches
    "PLR0911",  # Too many return statements
    "PLR0915",  # Too many statements
    "PERF401",  # Use list comprehension/extend
    "SIM117",   # Use single with statement
    "SIM102",   # Use single if statement
    "RUF012",   # Mutable default value for class attribute
    "RUF001",   # Ambiguous characters
    "PLW1508",  # Invalid type for environment variable default
    "E741",     # Ambiguous variable name (l is commonly used for lancamento)
    "E722",     # Bare except
    "E402",     # Module level import not at top of file
    "F401",     # Imported but unused (for __init__.py re-exports)
]

# Allow fix for all enabled rules (when `--fix`) is provided.
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[tool.ruff.format]
# Like Black, use double quotes for strings.
quote-style = "single"

# Like Black, indent with spaces, rather than tabs.
indent-style = "space"

# Like Black, respect magic trailing commas.
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending.
line-ending = "auto"

# Enable auto-formatting of code examples in docstrings.
docstring-code-format = false

[tool.ruff.lint.isort]
known-first-party = ["app"]
combine-as-imports = true
